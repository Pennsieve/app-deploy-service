name: ReadMe GitHub Action 🦉

on:
  push:
    branches:
      - main

jobs:
  rdme-openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo 📚
        uses: actions/checkout@v4
      - name: Find and Replace
        uses: jacobtomlinson/gha-find-replace@master
        with:
          find: "Unused"
          replace: "Authorization"
          include: "terraform/app-deploy-service.yml"
      - name: Strip internal endpoints
        uses: mikefarah/yq@master
        with:
          cmd: yq 'del(.paths[][] | select(.x-internal == true)) | del(.paths[] | select(length == 0))' terraform/app-deploy-service.yml > terraform/app-deploy-service-public.yml
      - name: Run `openapi` command 🚀
        uses: readmeio/rdme@v9
        with:
          rdme: openapi terraform/app-deploy-service-public.yml --key=${{ secrets.README_API_KEY }} --id=${{ secrets.README_API_DEFINITION_ID }}
