openapi: 3.0.1
info:
  version: "1.0"
  title: Applications API
  description: |
    This is the serverless Applications API
  termsOfService: https://docs.pennsieve.io/page/pennsieve-terms-of-use
  contact:
    name: Pennsieve Support
    email: support@pennsieve.net
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://api2.pennsieve.io/applications
    description: Production server
  - url: https://api2.pennsieve.net/applications
    description: Development server
tags:
  - name: Applications
    description: Manage applications
  - name: Deployments
    description: Manage application deployments
  - name: App Store
    description: App Store operations
  - name: App Permissions
    description: App Store permission management
components:
  x-amazon-apigateway-integrations:
    app-deploy-service:
      type: aws_proxy
      uri: ${app_deploy_service_lambda_arn}
      httpMethod: POST
      passthroughBehavior: when_no_match
      contentHandling: CONVERT_TO_TEXT
      payloadFormatVersion: 2.0
  securitySchemes:
    token_auth:
      type: "apiKey"
      name: "Authorization"
      in: "header"
      x-amazon-apigateway-authorizer:
        identitySource: "$request.header.Authorization"
        authorizerUri: ${authorize_lambda_invoke_uri}
        authorizerPayloadFormatVersion: "2.0"
        authorizerResultTtlInSeconds: 300
        type: "request"
        enableSimpleResponses: true
        authorizerCredentials: ${gateway_authorizer_role}
    token_workspace_auth:
      type: "apiKey"
      name: "Unused"
      in: "header"
      x-amazon-apigateway-authorizer:
        identitySource: "$request.header.Authorization,$request.querystring.organization_id"
        authorizerUri: ${authorize_lambda_invoke_uri}
        authorizerPayloadFormatVersion: "2.0"
        authorizerResultTtlInSeconds: 300
        type: "request"
        enableSimpleResponses: true
        authorizerCredentials: ${gateway_authorizer_role}
  responses:
    Unauthorized:
      description: Incorrect authentication or user has incorrect permissions.
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    Error:
      description: Server Error
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
x-amazon-apigateway-importexport-version: "1.0"
paths:
  /v1:
    post:
      deprecated: true
      summary: Create application
      description: Create a new application
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/app-deploy-service'
      operationId: postApplications
      security:
        - token_auth: []
      tags:
        - Applications
      responses:
        '201':
          description: Application created
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    get:
      deprecated: true
      summary: List applications
      description: Get a list of applications
      parameters:
        - in: query
          name: organization_id
          schema:
            type: string
          required: true
          description: The organization ID.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/app-deploy-service'
      operationId: getApplications
      security:
        - token_workspace_auth: []
      tags:
        - Applications
      responses:
        '200':
          description: List of applications
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /{id}:
    get:
      deprecated: true
      summary: Get application
      description: Get a specific application by ID
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/app-deploy-service'
      operationId: getApplication
      security:
        - token_auth: []
      tags:
        - Applications
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The application ID
      responses:
        '200':
          description: The requested application
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    put:
      deprecated: true
      summary: Update application
      description: Update an existing application
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/app-deploy-service'
      operationId: putApplication
      security:
        - token_auth: []
      tags:
        - Applications
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The application ID
      responses:
        '200':
          description: Application updated
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    delete:
      deprecated: true
      summary: Delete application
      description: Delete an application by ID
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/app-deploy-service'
      operationId: deleteApplication
      security:
        - token_auth: []
      tags:
        - Applications
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The application ID
      responses:
        '200':
          description: Application deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /{id}/deployments:
    get:
      deprecated: true
      summary: List deployments
      description: Get the deployment history for an application
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/app-deploy-service'
      operationId: getDeployments
      security:
        - token_workspace_auth: []
      tags:
        - Deployments
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The application ID
        - in: query
          name: organization_id
          required: true
          schema:
            type: string
          description: The node id of the application's workspace
      responses:
        '200':
          description: List of deployments
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /{id}/deployments/{deploymentId}:
    get:
      deprecated: true
      summary: Get deployment
      description: Get the details for a specific application deployment
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/app-deploy-service'
      operationId: getDeployment
      security:
        - token_workspace_auth: []
      tags:
        - Deployments
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The application ID
        - in: path
          name: deploymentId
          required: true
          schema:
            type: string
          description: The deployment ID
        - in: query
          name: organization_id
          required: true
          schema:
            type: string
          description: The node id of the application's workspace
      responses:
        '200':
          description: The requested deployment
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /deploy:
    post:
      deprecated: true
      summary: Deploy application
      description: Trigger a deployment for an application
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/app-deploy-service'
      operationId: postApplicationDeploy
      security:
        - token_auth: []
      tags:
        - Deployments
      responses:
        '200':
          description: Deployment triggered
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /store:
    post:
      summary: Create app store entry
      description: Create a new app store application
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/app-deploy-service'
      operationId: postAppStore
      security:
        - token_auth: []
      tags:
        - App Store
      responses:
        '201':
          description: App store entry created
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    get:
      summary: List app store applications
      description: Get a list of app store applications
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/app-deploy-service'
      operationId: getAppStoreApplications
      security:
        - token_auth: []
      tags:
        - App Store
      parameters:
        - in: query
          name: sourceUrl
          required: false
          schema:
            type: string
          description: Filter applications by source URL
      responses:
        '200':
          description: List of app store applications
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    uuid:
                      type: string
                    sourceUrl:
                      type: string
                    sourceType:
                      type: string
                    isPrivate:
                      type: boolean
                    visibility:
                      type: string
                    ownerId:
                      type: string
                    createdAt:
                      type: string
                    versions:
                      type: array
                      items:
                        type: object
                        properties:
                          uuid:
                            type: string
                          applicationId:
                            type: string
                          version:
                            type: string
                          releaseId:
                            type: integer
                          destinationUrl:
                            type: string
                          createdAt:
                            type: string
                          status:
                            type: string
                          deployments:
                            type: array
                            items:
                              type: object
                              properties:
                                deploymentId:
                                  type: string
                                applicationId:
                                  type: string
                                releaseId:
                                  type: integer
                                initiatedAt:
                                  type: string
                                  format: date-time
                                lastStatus:
                                  type: string
                                desiredStatus:
                                  type: string
                                taskArn:
                                  type: string
                                sourceUrl:
                                  type: string
                                tag:
                                  type: string
                                updatedAt:
                                  type: string
                                  format: date-time
                                createdAt:
                                  type: string
                                  format: date-time
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /store/authorize:
    get:
      summary: Authorize app store
      description: Checks whether a user is authorized to pull a specific appstore image and returns the ECR image URL
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/app-deploy-service'
      operationId: getAppStoreAuthorize
      security:
        - token_auth: []
      tags:
        - App Store
      parameters:
        - in: query
          name: sourceUrl
          required: true
          schema:
            type: string
          description: The git repository URL identifying the application
        - in: query
          name: version
          required: true
          schema:
            type: string
          description: The specific version tag (e.g. v1.0.7)
        - in: query
          name: userId
          required: true
          schema:
            type: string
          description: The ID of the user requesting access
      responses:
        '200':
          description: User is authorized to pull the image
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorized:
                    type: boolean
                  imageUrl:
                    type: string
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: User does not have access to this application
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorized:
                    type: boolean
                  message:
                    type: string
        '404':
          description: Application or version not found, or version not yet deployed
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorized:
                    type: boolean
                  message:
                    type: string
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /store/{id}/content:
    get:
      summary: Get app store content
      description: Retrieves a file from the synced content of an app store application. The content is read from S3 using the app's source URL and the specified tag as a namespace.
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/app-deploy-service'
      operationId: getAppStoreContent
      security:
        - token_auth: []
      tags:
        - App Store
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The app store application ID
        - in: query
          name: file
          required: true
          schema:
            type: string
          description: The file path to retrieve
        - in: query
          name: tag
          required: false
          schema:
            type: string
          description: The branch or tag to retrieve content from (defaults to main)
      responses:
        '200':
          description: The requested file content. Content-Type header is set based on the file type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
  /store/{id}/permissions:
    get:
      summary: Get app permissions
      description: Get permissions for an app store application
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/app-deploy-service'
      operationId: getAppPermissions
      security:
        - token_auth: []
      tags:
        - App Permissions
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The app store application ID
      responses:
        '200':
          description: App permissions
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
    put:
      summary: Update app permissions
      description: Update permissions for an app store application
      x-amazon-apigateway-integration:
        $ref: '#/components/x-amazon-apigateway-integrations/app-deploy-service'
      operationId: putAppPermissions
      security:
        - token_auth: []
      tags:
        - App Permissions
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The app store application ID
      responses:
        '200':
          description: Permissions updated
        '404':
          $ref: '#/components/responses/NotFound'
        '4XX':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/Error'
